# setup-pi.yml — Initial setup for KRZOS Raspberry Pi (headless configuration)

- name: Setup KRZOS Raspberry Pi
  hosts: all
  become: yes
  vars:
    raspi_config: /usr/bin/raspi-config
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: full
      register: apt_result

    - name: Enable passwordless sudo for pi user
      copy:
        content: "pi ALL=(ALL) NOPASSWD: ALL\n"
        dest: /etc/sudoers.d/010_pi-nopasswd
        owner: root
        group: root
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Install essential packages
      apt:
        name:
          - git
          - vim
          - tcsh
          - i2c-tools
          - python3-pip
          - python3-colorama
        state: present
      register: packages_result

    - name: Set hostname
      hostname:
        name: krzos-pi
      register: hostname_result

    - name: Update /etc/hosts with hostname
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: '127.0.1.1       krzos-pi'
      register: hosts_result

    - name: Enable I2C interface
      command: "{{ raspi_config }} nonint do_i2c 0"
      register: i2c_result
      changed_when: i2c_result.rc == 0

    - name: Enable SPI interface
      command: "{{ raspi_config }} nonint do_spi 0"
      register: spi_result
      changed_when: spi_result.rc == 0

    - name: Enable Serial Port hardware
      command: "{{ raspi_config }} nonint do_serial_hw 0"
      register: serial_hw_result
      changed_when: serial_hw_result.rc == 0

    - name: Disable Serial Console
      command: "{{ raspi_config }} nonint do_serial_cons 1"
      register: serial_cons_result
      changed_when: serial_cons_result.rc == 0

    - name: Enable Camera interface
      command: "{{ raspi_config }} nonint do_camera 0"
      register: camera_result
      changed_when: camera_result.rc == 0

    - name: Enable auto-login on console
      command: "{{ raspi_config }} nonint do_boot_behaviour B2"
      register: autologin_result
      changed_when: autologin_result.rc == 0

    - name: Expand filesystem to use full SD card
      command: "{{ raspi_config }} nonint do_expand_rootfs"
      register: expand_result
      changed_when: expand_result.rc == 0

    - name: Copy dotfiles to pi home
      copy:
        src: files/{{ item }}
        dest: /home/pi/{{ item }}
        owner: pi
        group: pi
        mode: '0644'
      loop:
        - .aliases
        - .cshrc
        - .dir_colors
        - .LSCOLORS
        - .prompt
        - .vimrc
      register: dotfiles_result

    - name: Ensure bin directory exists
      file:
        path: /home/pi/bin
        state: directory
        owner: pi
        group: pi
        mode: '0755'

    - name: Copy executable scripts to bin
      copy:
        src: files/bin/{{ item }}
        dest: /home/pi/bin/{{ item }}
        owner: pi
        group: pi
        mode: '0755'
      loop:
        - findpy
        - ipaddress.py
        - rsh
        - rsh
        - scanip

    - name: Copy motd
      copy:
        src: files/motd
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
      register: motd_result

    - name: Set tcsh as default shell for pi user
      user:
        name: pi
        shell: /bin/tcsh
      register: shell_result

    - name: Ensure .ssh directory exists
      file:
        path: /home/pi/.ssh
        state: directory
        owner: pi
        group: pi
        mode: '0700'

    - name: Add SSH public key to authorized_keys
      authorized_key:
        user: pi
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
      register: ssh_key_result

    - name: Copy GitHub SSH private key to Pi
      copy:
        src: ~/.ssh/id_rsa
        dest: /home/pi/.ssh/id_rsa
        owner: pi
        group: pi
        mode: '0600'

    - name: Copy GitHub SSH public key to Pi
      copy:
        src: ~/.ssh/id_rsa.pub
        dest: /home/pi/.ssh/id_rsa.pub
        owner: pi
        group: pi
        mode: '0644'

    - name: Install rshell via pip3
      pip:
        name: rshell
        extra_args: --break-system-packages
      register: pip_result

    - name: Add user to dialout group
      user:
        name: "{{ ansible_user }}"
        groups: dialout
        append: yes
      register: group_result

    - name: Reboot if changes were made
      reboot:
        msg: "Rebooting after initial setup"
        reboot_timeout: 300
      when: >
        apt_result.changed or
        packages_result.changed or
        hostname_result.changed or
        hosts_result.changed or
        dotfiles_result.changed or
        shell_result.changed or
        ssh_key_result.changed or
        pip_result.changed or
        group_result.changed

