# bootstrap-inventory.yml — inventory for use prior to sharing the ssh key.
#
# Use this inventory for initial Pi setup when SSH keys aren't configured yet.
# After running setup-pi.yml, switch to inventory.yml which uses key-based auth.
# Usage: PI_PASSWORD='...' ansible-playbook -i bootstrap-inventory.yml setup-pi.yml

all:
  hosts:
    krzos-pi:
      ansible_host: 192.168.1.81
      ansible_user: pi
      ansible_ssh_pass: "{{ lookup('env', 'PI_PASSWORD') }}"
      ansible_become_pass: "{{ lookup('env', 'PI_PASSWORD') }}"
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
